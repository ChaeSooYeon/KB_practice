<head>
  <title>CSS3 Selector Basic</title>
  <style>
    #header{
      background-color: red;
    }
    #wrap div{
      float: left;
    }
    #aside{
      background-color: blue;
      width: 30%;
    }
    #content{
      background-color: green;
      width: 70%;
    }
  </style>
</head>
<body>
<div id="header">
  <h1>#header 태그 </h1>
</div>
<div id="wrap">
  <div id="aside">
  <h1>#aside태그 </h1>
  </div>
  <div id="content">
    <h1>#content태그 </h1>
  </div>
</div>
</body>
</html>
