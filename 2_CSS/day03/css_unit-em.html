<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Unit -em,rem</title>
    <style>
      /* 상대값의 기준은 부모 || 선택자에 의해 정한경우 그 기준 */
      /* 상대값 사용을 권장(반응형 웹) ->폰트 크기는 rem(em), 길이는 % 사용  */
      /* rem: root em root, 즉 최상위 엘리먼트에서 지정된 font-size의 값을 기준(default:16px) */
      /* 
      ❗px 사용의 문제점
        모든 브라우저는 사용자가 font-size 설정이 가능하다. 
        따로 font-size를 지정하지 않은 경우에는 일반적으로 16px로 표시 되는데  개발자가 만약 font-size를 px로 고정하면, 
        사용자가 브라우저 설정에서 font-size를 변경하려고 해도 개발자가 정해둔 font-size에서 변경이 되지 않는다.
        예를 들어 css에서 font-size를 24px로 설정해두고 브라우저에서 사용자가 font-size를 40px로 바꾸려고 해도
        화면에 표시되는 크기는 24px에서 변하지 않는다. 한마디로 px은 사용자의 설정값을 덮어쓴다는 뜻이다.
      */
      /* 
        하지만 rem과 em도 용도에 맞게 적절히 혼용해서 사용할 수 있다. 
        예를 들어 어느 페이지에서든 고정된 사이즈를 사용해야 한다면 rem을, 
        부모 요소에 따라 유동적으로 변해야 하는 곳에는 em을 사용하면 된다.
        그래서 보통 font-size에는 rem을 사용하고 padding이나 margin같이 
        화면에 따라 유연하게 변하는 크기는 em을 사용한다 
      */
      p:nth-child(1) {
      }
      p:nth-child(2) {
        font-size: 1rem; /*1배*/
      }
      p:nth-child(3) {
        font-size: 1.5rem; /*1.5배*/
      }
      p:nth-child(4) {
        font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
  </body>
</html>
