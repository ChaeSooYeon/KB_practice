<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>box model-border,padding,margin</title>
    <style>
      h1 {
        border-bottom: 1px solid black;
        padding: 10px;
      }
      span {
        padding: 5px;
        width: 100px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Emotion</h1>
    <span>Sad</span>
    <span>Happy</span>
    <span>love</span>
  </body>
</html>
