<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selector</title>
  </head>
  <style>
    #p1 {
      color: red;
    }
    .p2 {
      background-color: yellow;
    }
    .p3 {
      background-color: blue;
    }
  </style>
  <body>
    <h1>Heading</h1>
    <p id="p1" class="p2">P1</p>
    <p class="p2">P2</p>
    <p class="p3">P3</p>
  </body>
</html>
