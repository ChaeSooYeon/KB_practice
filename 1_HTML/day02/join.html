<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="id">사용자 ID</label></td>
            <td><input type="text" name="id" id="id" /></td>
          </tr>
          <tr>
            <td><label for="pw">비밀번호</label></td>
            <td><input type="password" name="pw" id="pw" /></td>
          </tr>
          <tr>
            <td><label for="pw-chk">비밀번호 확인</label></td>
            <td><input type="password" name="pw" id="pw-chk" /></td>
          </tr>
          <tr>
            <td><label for="name">이름</label></td>
            <td><input type="text" name="name" id="name" /></td>
          </tr>
          <tr>
            <td>성별</td>
            <td>
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남</label>
              <input id="women" type="radio" name="gender" value="w" />
              <label for="women">여</label>
            </td>
          </tr>
          <tr>
            <td>취미</td>
            <td>
              <input type="checkbox" name="hobby" id="soc" />
              <label for="soc">축구</label>
              <input type="checkbox" name="hobby" id="base" />
              <label for="base">야구</label>
              <input type="checkbox" name="hobby" id="val" />
              <label for="val">배구</label>
              <input type="checkbox" name="hobby" id="bask" />
              <label for="bask">농구</label>
            </td>
          </tr>
          <tr>
            <td>email</td>
            <td><input type="email" name="email" id="email" /></td>
          </tr>
          <tr>
            <td>역할</td>
            <td>
              <select name="role" id="role">
                <option value="admin">ADMIN</option>
                <option value="manage">관리자</option>
                <option value="user">일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="가입하기" />
        <input type="reset" value="초기화" />
      </fieldset>
    </form>
  </body>
</html>
